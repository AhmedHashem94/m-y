services:
  # ── NestJS API ──
  - type: web
    name: mamy-api
    runtime: node
    plan: free
    buildCommand: NODE_ENV=development npm ci && npx nx build api
    startCommand: node dist/api/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── Angular SSR Client ──
  - type: web
    name: mamy-client
    runtime: node
    plan: free
    buildCommand: NODE_ENV=development npm ci && npx nx build client --configuration=production
    startCommand: node dist/client/server/server.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: API_URL
        sync: false
