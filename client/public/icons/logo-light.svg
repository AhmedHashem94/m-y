<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a6200"/>
      <stop offset="35%" stop-color="#c9a227"/>
      <stop offset="65%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#7a5500"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="50%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#a8841e"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdf5"/>
      <stop offset="100%" stop-color="#faf5e4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#c9a227" flood-opacity="0.15"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&amp;family=Montserrat:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Background rounded rect -->
  <rect width="600" height="600" rx="60" ry="60" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="596" height="596" rx="58" ry="58" fill="none" stroke="#d4af37" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="10" y="10" width="580" height="580" rx="52" ry="52" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- ── GEOMETRIC ICON centered at 300,195 ── -->
  <g transform="translate(300,195)" filter="url(#softShadow)">
    <!-- Outer rounded octagon -->
    <path d="M0,-90 L63,-63 L90,0 L63,63 L0,90 L-63,63 L-90,0 L-63,-63 Z"
      fill="none" stroke="url(#goldMain)" stroke-width="1.5" stroke-linejoin="round" opacity="0.5"/>

    <!-- Rotated rounded square -->
    <rect x="-46" y="-46" width="92" height="92" rx="10" ry="10"
      fill="none" stroke="url(#goldMain)" stroke-width="2"
      transform="rotate(45)"/>

    <!-- Inner rotated square -->
    <rect x="-28" y="-28" width="56" height="56" rx="6" ry="6"
      fill="none" stroke="url(#goldShine)" stroke-width="1.5"
      transform="rotate(45)" opacity="0.7"/>

    <!-- Center filled rounded diamond -->
    <rect x="-16" y="-16" width="32" height="32" rx="4" ry="4"
      fill="url(#goldShine)" transform="rotate(45)"/>

    <!-- 4 corner accent dots -->
    <circle cx="0" cy="-90" r="3" fill="#c9a227" opacity="0.7"/>
    <circle cx="90" cy="0" r="3" fill="#c9a227" opacity="0.7"/>
    <circle cx="0" cy="90" r="3" fill="#c9a227" opacity="0.7"/>
    <circle cx="-90" cy="0" r="3" fill="#c9a227" opacity="0.7"/>

    <!-- 4 diagonal accent dots -->
    <circle cx="63" cy="-63" r="2" fill="#c9a227" opacity="0.4"/>
    <circle cx="63" cy="63" r="2" fill="#c9a227" opacity="0.4"/>
    <circle cx="-63" cy="63" r="2" fill="#c9a227" opacity="0.4"/>
    <circle cx="-63" cy="-63" r="2" fill="#c9a227" opacity="0.4"/>
  </g>

  <!-- ── DIVIDER LINE ── -->
  <line x1="200" y1="318" x2="400" y2="318" stroke="url(#goldMain)" stroke-width="0.8" opacity="0.5"/>

  <!-- ── M&Y WORDMARK ── -->
  <text x="300" y="390"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="100"
    font-weight="600"
    letter-spacing="18"
    text-anchor="middle"
    fill="url(#goldMain)">M&amp;Y</text>

  <!-- ── LOWER DIVIDER ── -->
  <line x1="210" y1="408" x2="390" y2="408" stroke="url(#goldMain)" stroke-width="0.8" opacity="0.4"/>

  <!-- ── malika & younis subtitle ── -->
  <text x="300" y="435"
    font-family="'Montserrat', Arial, sans-serif"
    font-size="16"
    font-weight="300"
    letter-spacing="6"
    text-anchor="middle"
    fill="#a0894d">malika &amp; younis</text>

  <!-- ── STORE tag ── -->
  <text x="300" y="460"
    font-family="'Montserrat', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="10"
    text-anchor="middle"
    fill="#8a7030">STORE</text>
</svg>
