<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a6200"/>
      <stop offset="35%" stop-color="#c9a227"/>
      <stop offset="65%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#7a5500"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="50%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#a8841e"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdf5"/>
      <stop offset="100%" stop-color="#faf5e4"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="252" fill="none" stroke="#d4af37" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="#d4af37" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Geometric icon centered -->
  <g transform="translate(256,256)">
    <path d="M0,-110 L77,-77 L110,0 L77,77 L0,110 L-77,77 L-110,0 L-77,-77 Z"
      fill="none" stroke="url(#goldMain)" stroke-width="2" stroke-linejoin="round" opacity="0.45"/>

    <rect x="-58" y="-58" width="116" height="116" rx="14" ry="14"
      fill="none" stroke="url(#goldMain)" stroke-width="2.5"
      transform="rotate(45)"/>

    <rect x="-36" y="-36" width="72" height="72" rx="8" ry="8"
      fill="none" stroke="url(#goldShine)" stroke-width="2"
      transform="rotate(45)" opacity="0.75"/>

    <rect x="-20" y="-20" width="40" height="40" rx="5" ry="5"
      fill="url(#goldShine)" transform="rotate(45)"/>

    <circle cx="0" cy="-110" r="4" fill="#c9a227" opacity="0.8"/>
    <circle cx="110" cy="0" r="4" fill="#c9a227" opacity="0.8"/>
    <circle cx="0" cy="110" r="4" fill="#c9a227" opacity="0.8"/>
    <circle cx="-110" cy="0" r="4" fill="#c9a227" opacity="0.8"/>
  </g>
</svg>
